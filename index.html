<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap');

        :root {
            --bg: #0d0d0f;
            --surface: #161618;
            --card: #1e1e22;
            --card-hover: #242428;
            --border: #2a2a30;
            --text: #f0f0f5;
            --muted: #6b6b7a;
            --gold: #f5c518;
            --gold-dim: #9e7e0f;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --sidebar-w: 230px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-logo {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo .cup-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            letter-spacing: 2px;
            color: var(--gold);
            line-height: 1;
        }

        .sidebar-logo .cup-subtitle {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
        }

        .nav-group-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            padding: 12px 10px 6px;
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            text-align: left;
            padding: 10px 12px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 2px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-btn span.icon { font-size: 16px; width: 20px; text-align: center; }

        .menu-btn:hover { background: var(--card); color: var(--text); }

        .menu-btn.active {
            background: rgba(245, 197, 24, 0.12);
            color: var(--gold);
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
        }

        .sync-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s;
        }

        .sync-btn:hover { background: rgba(59, 130, 246, 0.2); }

        /* ── MAIN ── */
        .main-content {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
            background: var(--bg);
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 2px;
            color: var(--text);
            line-height: 1;
        }

        .page-title em {
            color: var(--gold);
            font-style: normal;
        }

        /* ── DATE HEADER ── */
        .date-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── MATCH CARD ── */
        .match-card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            transition: border-color 0.15s;
            overflow: hidden;
        }

        .match-card:hover { border-color: #3a3a44; }
        .match-card.hoje { border-color: var(--gold-dim); }
        .match-card.passado { border-color: rgba(34, 197, 94, 0.3); }

        .match-main {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .match-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 90px;
        }

        .match-time {
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            font-variant-numeric: tabular-nums;
        }

        .match-tag {
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
        }

        .match-teams {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
            min-width: 260px;
        }

        .team-block {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 110px;
        }

        .team-block.right { flex-direction: row-reverse; text-align: right; }

        .team-flag { font-size: 22px; }

        .team-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .score-area {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-input {
            width: 44px;
            height: 40px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
        }

        .score-input::-webkit-inner-spin-button,
        .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .score-input:focus { outline: none; border-color: var(--gold); background: #1a1a1e; }

        .vs-sep {
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        /* ── SCORERS PANEL ── */
        .scorers-toggle {
            background: none;
            border: none;
            border-top: 1px solid var(--border);
            width: 100%;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 9px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s, background 0.15s;
        }

        .scorers-toggle:hover { color: var(--text); background: rgba(255,255,255,0.03); }
        .scorers-toggle.open { color: var(--gold); }

        .scorers-panel {
            display: none;
            padding: 14px 18px 16px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            gap: 16px;
        }

        .scorers-panel.open { display: flex; flex-wrap: wrap; }

        .scorers-side {
            flex: 1;
            min-width: 200px;
        }

        .scorers-side-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .scorer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .scorer-name-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 6px 10px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        .scorer-name-input:focus { border-color: var(--gold); }
        .scorer-name-input::placeholder { color: var(--muted); }

        .scorer-goals-input {
            width: 38px;
            text-align: center;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--gold);
            border-radius: 6px;
            padding: 6px 4px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            outline: none;
            -moz-appearance: textfield;
        }

        .scorer-goals-input::-webkit-inner-spin-button,
        .scorer-goals-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .scorer-goals-input:focus { border-color: var(--gold); }

        .remove-scorer {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 15px;
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.15s;
        }
        .remove-scorer:hover { color: var(--red); }

        .add-scorer-btn {
            background: none;
            border: 1px dashed var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 5px 10px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 4px;
            width: 100%;
        }

        .add-scorer-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,197,24,0.05); }

        /* ── ARTILHEIROS TAB ── */
        .artilheiros-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 8px;
        }

        @media (max-width: 700px) {
            .artilheiros-grid { grid-template-columns: 1fr; }
        }

        .artilheiros-section {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .artilheiros-section.full { grid-column: 1 / -1; }

        .artilheiros-section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1.5px;
            color: var(--gold);
            padding: 14px 18px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scorer-rank-row {
            display: flex;
            align-items: center;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            transition: background 0.1s;
        }

        .scorer-rank-row:last-child { border-bottom: none; }
        .scorer-rank-row:hover { background: var(--card-hover); }

        .scorer-rank-pos {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            width: 28px;
            text-align: center;
            color: var(--muted);
        }

        .scorer-rank-pos.gold { color: var(--gold); }
        .scorer-rank-pos.silver { color: #94a3b8; }
        .scorer-rank-pos.bronze { color: #cd7c3a; }

        .scorer-rank-info { flex: 1; }

        .scorer-rank-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .scorer-rank-team {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px;
        }

        .scorer-rank-goals {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: var(--gold);
            line-height: 1;
        }

        .scorer-rank-bar-wrap {
            position: relative;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .scorer-rank-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--gold), #f59e0b);
            transition: width 0.6s ease;
        }

        /* ── GROUPS TABLE ── */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .group-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .group-card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--gold);
            padding: 12px 16px 10px;
            border-bottom: 1px solid var(--border);
            background: rgba(245,197,24,0.04);
        }

        .table-header {
            display: grid;
            grid-template-columns: 24px 1fr 28px 28px 28px 28px;
            gap: 4px;
            padding: 6px 14px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .table-row {
            display: grid;
            grid-template-columns: 24px 1fr 28px 28px 28px 28px;
            gap: 4px;
            padding: 8px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            transition: background 0.1s;
        }

        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: var(--card-hover); }
        .table-row.qual { background: rgba(34,197,94,0.06); }
        .table-row.qual:hover { background: rgba(34,197,94,0.1); }

        .table-row .pos { color: var(--muted); font-size: 12px; font-weight: 600; }

        .pts-col { font-weight: 700; color: var(--gold); text-align: center; }
        .num-col { text-align: center; color: var(--muted); }

        /* ── MATA-MATA ── */
        .bracket-wrap {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .bracket-col {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 240px;
        }

        .bracket-col-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--gold);
            text-align: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .bracket-match {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 13px;
        }

        .bracket-match.preenchido { border-color: var(--gold-dim); }

        .bracket-team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }

        .bracket-team-row:first-child { border-bottom: 1px solid var(--border); margin-bottom: 2px; }

        .bracket-team-name {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            font-size: 12px;
        }

        .bracket-score-input {
            width: 32px;
            height: 28px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--gold);
            border-radius: 5px;
            -moz-appearance: textfield;
        }

        .bracket-score-input::-webkit-inner-spin-button,
        .bracket-score-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .bracket-score-input:focus { outline: none; border-color: var(--gold); }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--green);
            color: #000;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.25s;
            z-index: 2000;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow: auto; }

            .sidebar {
                width: 100%;
                flex-direction: row;
                height: auto;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-logo { padding: 10px 14px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; }
            .sidebar-logo .cup-subtitle { display: none; }
            .sidebar-logo .cup-title { font-size: 20px; }

            .sidebar-nav {
                display: flex;
                flex-direction: row;
                align-items: center;
                padding: 6px 8px;
                overflow-x: auto;
                gap: 2px;
            }

            .nav-group-label { display: none; }
            .sidebar-footer { display: none; }

            .menu-btn {
                white-space: nowrap;
                padding: 8px 12px;
                font-size: 12px;
                flex-shrink: 0;
                border-radius: 6px;
            }

            .menu-btn span.icon { font-size: 14px; }

            .main-content { height: auto; }

            .container { padding: 16px 14px; }

            .match-teams { min-width: unset; }

            .team-block { min-width: unset; }
            .team-name { font-size: 12px; }

            .artilheiros-grid { grid-template-columns: 1fr; }

            .bracket-wrap { flex-direction: column; }
        }
    </style>
</head>

<!-- SIDEBAR -->
<nav class="sidebar">

</nav>

let resultados = {};
let marcadores = {};
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzhoR9fcqDu5YJ-npWpyu_doPBZOzNkVLjr9rCwk08n_-WKxQzejY2bmui1MvcBTLrLMw/exec';

// Debounce para não disparar sync em cada tecla
let syncTimer = null;

function carregarEstado() {
    try {
        resultados = JSON.parse(localStorage.getItem('copa26_res')) || {};
        marcadores = JSON.parse(localStorage.getItem('copa26_marc')) || {};
    } catch(e) { resultados = {}; marcadores = {}; }
}

function salvarEstado() {
    localStorage.setItem('copa26_res',  JSON.stringify(resultados));
    localStorage.setItem('copa26_marc', JSON.stringify(marcadores));
    // Debounce de 2s — evita guardar em cada tecla
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => guardarComMerge(true), 2000);
}

// Merge local: une dados do servidor com dados locais
// Os dados locais têm prioridade (são mais recentes para este utilizador)
// Mas preserva dados do servidor que este utilizador não tem
function mergeResultados(servidor, local) {
    var merged = Object.assign({}, servidor);
    var ids = Object.keys(local);
    for (var i = 0; i < ids.length; i++) {
        var id  = ids[i];
        var loc = local[id];
        // Só sobrescreve se o valor local tiver dados reais
        if (loc.casa !== '' || loc.fora !== '') {
            merged[id] = loc;
        }
    }
    return merged;
}

function mergeMarcadores(servidor, local) {
    var merged = JSON.parse(JSON.stringify(servidor)); // deep clone
    var ids = Object.keys(local);
    for (var i = 0; i < ids.length; i++) {
        var id   = ids[i];
        var loc  = local[id];
        // Se este utilizador tem marcadores para este jogo, usa os locais
        var temLocal = (loc.casa && loc.casa.length > 0) || (loc.fora && loc.fora.length > 0);
        if (temLocal) {
            merged[id] = loc;
        }
    }
    return merged;
}

// Guarda com merge: carrega servidor → merge → guarda resultado final
async function guardarComMerge(silencioso) {
    if (_syncEmCurso) return;
    _syncEmCurso = true;

    var icon   = document.getElementById('syncIcon');
    var label  = document.getElementById('syncLabel');
    var status = document.getElementById('syncStatus');
    var btn    = document.getElementById('syncBtn');
    if (btn)    btn.style.opacity = '0.7';
    if (icon)   icon.textContent  = '🔄';
    if (label)  label.textContent = 'A sincronizar...';

    try {
        // 1. Ler dados actuais do servidor
        var dadosServidor = await jsonpFetch({ acao: 'carregar' });
        var resServidor   = (dadosServidor && dadosServidor.resultados) ? dadosServidor.resultados : {};
        var marcServidor  = (dadosServidor && dadosServidor.marcadores) ? dadosServidor.marcadores : {};

        // 2. Merge: servidor como base + dados locais por cima
        var resMerged  = mergeResultados(resServidor,  resultados);
        var marcMerged = mergeMarcadores(marcServidor, marcadores);

        // 3. Actualizar estado local com o merge
        resultados = resMerged;
        marcadores = marcMerged;
        localStorage.setItem('copa26_res',  JSON.stringify(resultados));
        localStorage.setItem('copa26_marc', JSON.stringify(marcadores));

        // 4. Guardar merge no servidor
        await jsonpFetch({
            acao:       'salvar',
            resultados: JSON.stringify(resMerged),
            marcadores: JSON.stringify(marcMerged),
            timestamp:  new Date().toISOString()
        });

        var hora = new Date().toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        if (!silencioso) mostrarToast('✅ Guardado às ' + hora);
        if (icon)   icon.textContent   = '✅';
        if (label)  label.textContent  = 'Guardado';
        if (status) status.textContent = 'Último sync: ' + hora;
        setTimeout(function() {
            if (icon)  icon.textContent  = '☁️';
            if (label) label.textContent = 'Sincronizar agora';
        }, 3000);

    } catch (err) {
        // Fallback: tenta guardar directamente sem merge
        try {
            await jsonpFetch({
                acao:       'salvar',
                resultados: JSON.stringify(resultados),
                marcadores: JSON.stringify(marcadores),
                timestamp:  new Date().toISOString()
            });
            if (!silencioso) mostrarToast('✅ Guardado (sem merge)');
        } catch(err2) {
            if (!silencioso) mostrarToast('⚠️ Erro ao guardar.');
            if (icon)   icon.textContent   = '⚠️';
            if (label)  label.textContent  = 'Tentar novamente';
            if (status) status.textContent = 'Falha: ' + err.message;
        }
    } finally {
        _syncEmCurso = false;
        if (btn) btn.style.opacity = '1';
    }
}

function renderizarLista(tipo) {
    const hoje = new Date().toISOString().split('T')[0];
    let lista;
    let titulo;
    if(tipo === 'hoje') {
        lista = jogos.filter(j => j.data === hoje);
        titulo = '📅 Jogos de Hoje';
        if(!lista.length) return emptyState('📅', 'Nenhum jogo programado para hoje.');
    } else if(tipo === 'anteriores') {
        lista = jogos.filter(j => j.data < hoje);
        titulo = '⏪ Jogos Anteriores';
        if(!lista.length) return emptyState('⏪', 'Nenhum jogo realizado ainda.');
    } else {
        lista = jogos.filter(j => j.data > hoje);
        titulo = '⏩ Próximos Jogos';
        if(!lista.length) return emptyState('⏩', 'Sem jogos futuros.');
    }
    return `<div class="page-header"><h1 class="page-title">${titulo}</h1></div>` + gerarCardsJogos(lista);
}

function renderizarCalendario() {
    const datas = [...new Set(jogos.map(j => j.data))].sort();
    let html = `<div class="page-header"><h1 class="page-title">📆 Calendário <em>Completo</em></h1></div>`;
    datas.forEach(d => {
        html += `<div class="date-header">${formatarData(d)}</div>`;
        html += gerarCardsJogos(jogos.filter(j => j.data === d));
    });
    return html;
}

function gerarCardsJogos(lista) {
    return lista.map(j => {
        const chave = `${j.id}`;
        const res = resultados[chave] || { casa:'', fora:'' };
        const hoje = new Date().toISOString().split('T')[0];
        let cls = 'match-card';
        if(j.data === hoje) cls += ' hoje';
        else if(j.data < hoje) cls += ' passado';

        return `
        <div class="${cls}" data-id="${j.id}">
          <div class="match-main">
            <div class="match-meta">
              <span class="match-time">${j.hora}</span>
              <span class="match-tag">Grupo ${j.grupo} · J${j.jornada}</span>
            </div>
            <div class="match-teams">
              <div class="team-block">
                <span class="team-flag">${bandeiras[j.casa]}</span>
                <span class="team-name">${nomes[j.casa]}</span>
              </div>
              <div class="score-area">
                <input type="number" class="score-input" data-chave="${chave}" data-time="casa" value="${res.casa}" min="0" placeholder="–">
                <span class="vs-sep">:</span>
                <input type="number" class="score-input" data-chave="${chave}" data-time="fora" value="${res.fora}" min="0" placeholder="–">
              </div>
              <div class="team-block right">
                <span class="team-flag">${bandeiras[j.fora]}</span>
                <span class="team-name">${nomes[j.fora]}</span>
              </div>
            </div>
          </div>
          <button class="scorers-toggle" onclick="toggleMarcadores(${j.id}, this)">
            <span>⚽</span> Marcadores ${contarMarcadoresTotal(chave) > 0 ? '· '+contarMarcadoresTotal(chave)+' gol(os) registado(s)' : ''}
          </button>
          <div class="scorers-panel" id="scorers-${j.id}">
            ${renderPainelMarcadores(j)}
          </div>
        </div>`;
    }).join('');
}

function contarMarcadoresTotal(chave) {
    const m = marcadores[chave];
    if(!m) return 0;
    let t = 0;
    (m.casa || []).forEach(s => { t += parseInt(s.gols) || 0; });
    (m.fora || []).forEach(s => { t += parseInt(s.gols) || 0; });
    return t;
}

function renderPainelMarcadores(jogo) {
    const chave = `${jogo.id}`;
    const m = marcadores[chave] || { casa:[], fora:[] };
    return `
      <div class="scorers-side">
        <div class="scorers-side-label">${bandeiras[jogo.casa]} ${nomes[jogo.casa]}</div>
        <div id="scorers-casa-${jogo.id}">
          ${(m.casa||[]).map((s,i) => rowMarcador(jogo.id,'casa',i,s.nome,s.gols)).join('')}
        </div>
        <button class="add-scorer-btn" onclick="adicionarMarcador(${jogo.id},'casa')">+ Adicionar marcador</button>
      </div>
      <div class="scorers-side">
        <div class="scorers-side-label">${bandeiras[jogo.fora]} ${nomes[jogo.fora]}</div>
        <div id="scorers-fora-${jogo.id}">
          ${(m.fora||[]).map((s,i) => rowMarcador(jogo.id,'fora',i,s.nome,s.gols)).join('')}
        </div>
        <button class="add-scorer-btn" onclick="adicionarMarcador(${jogo.id},'fora')">+ Adicionar marcador</button>
      </div>`;
}

function rowMarcador(jogoId, lado, idx, nome, gols) {
    return `
    <div class="scorer-row" id="scorer-row-${jogoId}-${lado}-${idx}">
      <input type="text" class="scorer-name-input"
        placeholder="Nome do jogador"
        value="${nome||''}"
        onchange="atualizarMarcador(${jogoId},'${lado}',${idx},'nome',this.value)">
      <input type="number" class="scorer-goals-input" min="1" max="10"
        value="${gols||1}"
        onchange="atualizarMarcador(${jogoId},'${lado}',${idx},'gols',this.value)">
      <button class="remove-scorer" onclick="removerMarcador(${jogoId},'${lado}',${idx})">×</button>
    </div>`;
}

function toggleMarcadores(id, btn) {
    const panel = document.getElementById(`scorers-${id}`);
    panel.classList.toggle('open');
    btn.classList.toggle('open');
}

function adicionarMarcador(jogoId, lado) {
    const chave = `${jogoId}`;
    if(!marcadores[chave]) marcadores[chave] = { casa:[], fora:[] };
    if(!marcadores[chave][lado]) marcadores[chave][lado] = [];
    marcadores[chave][lado].push({ nome:'', gols:1 });
    salvarEstado();
    const container = document.getElementById(`scorers-${lado}-${jogoId}`);
    const idx = marcadores[chave][lado].length - 1;
    const row = document.createElement('div');
    row.innerHTML = rowMarcador(jogoId, lado, idx, '', 1);
    container.appendChild(row.firstElementChild);
    // Update button text
    atualizarBotaoMarcadores(jogoId);
}

function removerMarcador(jogoId, lado, idx) {
    const chave = `${jogoId}`;
    if(marcadores[chave] && marcadores[chave][lado]) {
        marcadores[chave][lado].splice(idx, 1);
        salvarEstado();
        // Re-render only this side
        const jogo = jogos.find(j => j.id === jogoId);
        const container = document.getElementById(`scorers-${lado}-${jogoId}`);
        const lista = marcadores[chave][lado] || [];
        container.innerHTML = lista.map((s,i) => rowMarcador(jogoId,lado,i,s.nome,s.gols)).join('');
        atualizarBotaoMarcadores(jogoId);
    }
}

function atualizarMarcador(jogoId, lado, idx, campo, valor) {
    const chave = `${jogoId}`;
    if(!marcadores[chave]) marcadores[chave] = { casa:[], fora:[] };
    if(!marcadores[chave][lado]) marcadores[chave][lado] = [];
    if(!marcadores[chave][lado][idx]) marcadores[chave][lado][idx] = { nome:'', gols:1 };
    marcadores[chave][lado][idx][campo] = campo === 'gols' ? parseInt(valor)||1 : valor;
    salvarEstado();
    atualizarBotaoMarcadores(jogoId);
}

function atualizarBotaoMarcadores(jogoId) {
    const btn = document.querySelector(`[data-id="${jogoId}"] .scorers-toggle`);
    if(btn) {
        const total = contarMarcadoresTotal(`${jogoId}`);
        btn.innerHTML = `<span>⚽</span> Marcadores ${total > 0 ? '· '+total+' gol(os) registado(s)' : ''}`;
    }
}

// ============================================================
//  RENDER — ARTILHEIROS
// ============================================================
function renderizarArtilheiros() {
    const ranking = calcularRankingArtilheiros();
    const porEquipa = calcularRankingPorEquipa();

    let html = `<div class="page-header"><h1 class="page-title">👟 Artilheiros <em>2026</em></h1></div>`;

    if(ranking.length === 0) {
        return html + emptyState('⚽', 'Registe os marcadores nos jogos para ver o ranking aqui.');
    }

    const max = ranking[0]?.gols || 1;

    html += `<div class="artilheiros-grid">`;
    html += `<div class="artilheiros-section full">
        <div class="artilheiros-section-title">🥇 Ranking Geral de Artilheiros</div>`;

    ranking.slice(0, 30).forEach((p, i) => {
        const posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const pct = Math.round((p.gols / max) * 100);
        html += `
        <div class="scorer-rank-row">
          <div class="scorer-rank-pos ${posClass}">${i+1}</div>
          <div class="scorer-rank-info">
            <div class="scorer-rank-name">${p.nome}</div>
            <div class="scorer-rank-team">${bandeiras[p.equipa] || ''} ${nomes[p.equipa] || p.equipa}</div>
            <div class="scorer-rank-bar-wrap">
              <div class="scorer-rank-bar" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="scorer-rank-goals">${p.gols}</div>
        </div>`;
    });
    html += `</div>`;

    // Por equipa
    html += `<div class="artilheiros-section full">
        <div class="artilheiros-section-title">🏳️ Golos por Seleção</div>`;
    const maxEq = porEquipa[0]?.gols || 1;
    porEquipa.slice(0,20).forEach((e, i) => {
        const pct = Math.round((e.gols / maxEq) * 100);
        html += `
        <div class="scorer-rank-row">
          <div class="scorer-rank-pos ${i<3?['gold','silver','bronze'][i]:''}">${i+1}</div>
          <div class="scorer-rank-info">
            <div class="scorer-rank-name">${bandeiras[e.equipa] || ''} ${nomes[e.equipa] || e.equipa}</div>
            <div class="scorer-rank-team">${e.jogadores} marcador(es) diferente(s)</div>
            <div class="scorer-rank-bar-wrap">
              <div class="scorer-rank-bar" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="scorer-rank-goals">${e.gols}</div>
        </div>`;
    });
    html += `</div></div>`;
    return html;
}

function calcularRankingArtilheiros() {
    const mapa = {};
    Object.entries(marcadores).forEach(([chave, lados]) => {
        const jogo = jogos.find(j => `${j.id}` === chave);
        if(!jogo) return;
        ['casa','fora'].forEach(lado => {
            const equipa = jogo[lado];
            (lados[lado] || []).forEach(s => {
                if(!s.nome.trim()) return;
                const key = `${s.nome.trim().toLowerCase()}|${equipa}`;
                if(!mapa[key]) mapa[key] = { nome: s.nome.trim(), equipa, gols: 0 };
                mapa[key].gols += parseInt(s.gols) || 0;
            });
        });
    });
    return Object.values(mapa).sort((a,b) => b.gols - a.gols || a.nome.localeCompare(b.nome));
}

function calcularRankingPorEquipa() {
    const mapa = {};
    Object.entries(marcadores).forEach(([chave, lados]) => {
        const jogo = jogos.find(j => `${j.id}` === chave);
        if(!jogo) return;
        ['casa','fora'].forEach(lado => {
            const equipa = jogo[lado];
            if(!mapa[equipa]) mapa[equipa] = { equipa, gols:0, jogadores: new Set() };
            (lados[lado] || []).forEach(s => {
                if(!s.nome.trim()) return;
                mapa[equipa].gols += parseInt(s.gols) || 0;
                mapa[equipa].jogadores.add(s.nome.trim().toLowerCase());
            });
        });
    });
    return Object.values(mapa).map(e => ({ ...e, jogadores: e.jogadores.size }))
        .sort((a,b) => b.gols - a.gols);
}

// ============================================================
//  RENDER — GRUPOS
// ============================================================
function renderizarGrupos() {
    const grupos = [...new Set(jogos.map(j => j.grupo))].sort();
    let html = `<div class="page-header"><h1 class="page-title">📊 Fase de <em>Grupos</em></h1></div>
    <div class="groups-grid">`;
    grupos.forEach(g => {
        const tabela = calcularTabela(g);
        html += `<div class="group-card">
          <div class="group-card-title">GRUPO ${g}</div>
          <div class="table-header">
            <span>#</span><span>Seleção</span>
            <span title="Pontos">P</span>
            <span title="Gols Marcados">GM</span>
            <span title="Gols Sofridos">GS</span>
            <span title="Saldo">S</span>
          </div>`;
        tabela.forEach((t, i) => {
            html += `<div class="table-row ${i<2?'qual':''}">
              <span class="pos">${i+1}</span>
              <span>${bandeiras[t.time]} ${nomes[t.time]}</span>
              <span class="pts-col">${t.pontos}</span>
              <span class="num-col">${t.gf}</span>
              <span class="num-col">${t.ga}</span>
              <span class="num-col" style="color:${t.gd>0?'var(--green)':t.gd<0?'var(--red)':'var(--muted)'}">${t.gd>0?'+':''}${t.gd}</span>
            </div>`;
        });
        html += `</div>`;
    });
    html += `</div>`;
    return html;
}

// ============================================================
//  RENDER — MATA-MATA
// ============================================================
function renderizarMataMata() {
    const container = document.getElementById('conteudoPrincipal');
    const classificados = obterClassificados();

    let html = `<div class="page-header"><h1 class="page-title">⚔️ Fase <em>Final</em></h1></div>`;
    html += `<div class="bracket-wrap">`;

    const oitavas  = gerarConfrontos(classificados);
    const quartas  = calcularProximaFase(oitavas, 'oitavas');
    const semis    = calcularProximaFase(quartas, 'quartas');
    const finalJ   = calcularProximaFase(semis, 'semis');

    html += colunaBracket('OITAVAS DE FINAL', oitavas, 'oitavas');
    html += colunaBracket('QUARTAS DE FINAL', quartas, 'quartas');
    html += colunaBracket('SEMIFINAIS', semis, 'semis');
    html += colunaBracket('FINAL 🏆', finalJ, 'final');
    html += `</div>`;

    container.innerHTML = html;

    document.querySelectorAll('.bracket-score-input').forEach(input => {
        input.addEventListener('input', function() {
            const chave = this.dataset.chave;
            const time  = this.dataset.time;
            if(!resultados[chave]) resultados[chave] = { casa:'', fora:'' };
            resultados[chave][time] = this.value;
            salvarEstado();
            renderizarMataMata();
        });
    });
}

function colunaBracket(titulo, confrontos, fase) {
    let html = `<div class="bracket-col"><div class="bracket-col-title">${titulo}</div>`;
    confrontos.forEach(j => {
        const chave = `F-${fase}-${j.id}`;
        const res = resultados[chave] || { casa:'', fora:'' };
        if(!j.casa) {
            html += `<div class="bracket-match" style="opacity:.4;font-size:12px;color:var(--muted);text-align:center;padding:18px;">Aguardando fase anterior...</div>`;
        } else {
            html += `<div class="bracket-match preenchido">
              <div class="bracket-team-row">
                <div class="bracket-team-name">${bandeiras[j.casa]} ${nomes[j.casa]}</div>
                <input type="number" class="bracket-score-input" data-chave="${chave}" data-time="casa" value="${res.casa}" min="0" placeholder="–">
              </div>
              <div class="bracket-team-row">
                <div class="bracket-team-name">${bandeiras[j.fora]} ${nomes[j.fora]}</div>
                <input type="number" class="bracket-score-input" data-chave="${chave}" data-time="fora" value="${res.fora}" min="0" placeholder="–">
              </div>
            </div>`;
        }
    });
    return html + `</div>`;
}

// ============================================================
//  LÓGICA GRUPOS / MATA-MATA
// ============================================================
function calcularTabela(grupo) {
    const jg = jogos.filter(j => j.grupo === grupo);
    const times = [...new Set(jg.flatMap(j => [j.casa, j.fora]))];
    let stats = times.map(t => ({ time:t, pontos:0, gf:0, ga:0, gd:0, j:0 }));

    jg.forEach(jogo => {
        const res = resultados[`${jogo.id}`];
        if(res && res.casa !== '' && res.fora !== '') {
            const c = parseInt(res.casa), f = parseInt(res.fora);
            const tC = stats.find(s => s.time === jogo.casa);
            const tF = stats.find(s => s.time === jogo.fora);
            tC.gf+=c; tC.ga+=f; tC.j++;
            tF.gf+=f; tF.ga+=c; tF.j++;
            if(c>f)      tC.pontos+=3;
            else if(c<f) tF.pontos+=3;
            else         { tC.pontos+=1; tF.pontos+=1; }
            tC.gd = tC.gf - tC.ga;
            tF.gd = tF.gf - tF.ga;
        }
    });
    return stats.sort((a,b) => b.pontos-a.pontos || b.gd-a.gd || b.gf-a.gf);
}

function obterClassificados() {
    const grupos = [...new Set(jogos.map(j => j.grupo))];
    let classif = {}, terceiros = [];
    grupos.forEach(g => {
        const t = calcularTabela(g);
        if(t[0]) classif[`1${g}`] = t[0].time;
        if(t[1]) classif[`2${g}`] = t[1].time;
        if(t[2]) terceiros.push({ time:t[2].time, pontos:t[2].pontos, gd:t[2].gd, gf:t[2].gf });
    });
    terceiros.sort((a,b)=>b.pontos-a.pontos||b.gd-a.gd||b.gf-a.gf);
    ['3A','3B','3C','3D'].forEach((k,i) => { if(terceiros[i]) classif[k] = terceiros[i].time; });
    return classif;
}

function gerarConfrontos(c) {
    return [
        { id:73, casa:c['1A'], fora:c['2B'] },
        { id:74, casa:c['1C'], fora:c['2D'] },
        { id:75, casa:c['1E'], fora:c['2F'] },
        { id:76, casa:c['1G'], fora:c['2H'] },
        { id:77, casa:c['1B'], fora:c['2A'] },
        { id:78, casa:c['1D'], fora:c['2C'] },
        { id:79, casa:c['1F'], fora:c['2E'] },
        { id:80, casa:c['1H'], fora:c['2G'] },
    ];
}

function calcularProximaFase(confrontos, fase) {
    let prox = [];
    for(let i=0; i<confrontos.length; i+=2) {
        const j1 = confrontos[i], j2 = confrontos[i+1];
        const chave1 = `F-${fase}-${j1.id}`;
        const chave2 = j2 ? `F-${fase}-${j2.id}` : null;
        let v1=null, v2=null;
        if(j1.casa) {
            const r = resultados[chave1];
            if(r && r.casa!=='' && r.fora!=='') {
                v1 = parseInt(r.casa)>parseInt(r.fora)?j1.casa:(parseInt(r.casa)<parseInt(r.fora)?j1.fora:j1.casa);
            }
        }
        if(j2 && j2.casa) {
            const r = resultados[chave2];
            if(r && r.casa!=='' && r.fora!=='') {
                v2 = parseInt(r.casa)>parseInt(r.fora)?j2.casa:(parseInt(r.casa)<parseInt(r.fora)?j2.fora:j2.casa);
            }
        }
        prox.push({ id: 80+prox.length+1, casa:v1, fora:v2 });
    }
    return prox;
}

// ============================================================
//  EVENTOS — SCORE INPUTS
// ============================================================
function anexarEventos() {
    document.querySelectorAll('.score-input').forEach(input => {
        input.addEventListener('input', function() {
            const chave = this.dataset.chave;
            const time  = this.dataset.time;
            if(!resultados[chave]) resultados[chave] = { casa:'', fora:'' };
            resultados[chave][time] = this.value;
            salvarEstado();
            const card = this.closest('.match-card');
            if(card) {
                const c = card.querySelector('input[data-time="casa"]')?.value;
                const f = card.querySelector('input[data-time="fora"]')?.value;
                if(c!==''&&f!=='') card.classList.add('passado');
                else card.classList.remove('passado');
            }
        });
    });
}

// ============================================================
//  GOOGLE SHEETS — SINCRONIZAÇÃO via JSONP
//  O Apps Script redireciona (302) — JSONP lida com isso
//  porque <script> segue redirects automaticamente
// ============================================================
let _syncEmCurso = false;
let _ultimoSync  = null;

function jsonpFetch(params) {
    return new Promise(function(resolve, reject) {
        var cbName = '__copa_cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
        var script = document.createElement('script');
        var done   = false;

        // Google Apps Script faz redirect 302 antes de responder.
        // Isso dispara onerror no Firefox/Chrome mesmo sendo redirect válido.
        // Por isso NÃO usamos onerror — só o timeout como fallback de erro real.
        var timer = setTimeout(function() {
            if (done) return;
            done = true;
            cleanup();
            reject(new Error('Timeout — Apps Script não respondeu'));
        }, 20000);

        function cleanup() {
            clearTimeout(timer);
            if (window[cbName]) delete window[cbName];
            if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cbName] = function(data) {
            if (done) return;
            done = true;
            cleanup();
            resolve(data);
        };

        var qs = new URLSearchParams(params);
        qs.set('callback', cbName);

        // crossOrigin não definido intencionalmente — permite redirect do Google
        script.src = SHEETS_URL + '?' + qs.toString();

        // onerror DESACTIVADO: o Google faz 302→200 e o browser reporta
        // onerror no redirect mesmo quando o script acaba por carregar.
        // Deixamos o timeout tratar falhas reais.

        document.head.appendChild(script);
    });
}

// guardarSheets → alias para guardarComMerge (evita sobrescrita entre utilizadores)
function guardarSheets(silencioso) { return guardarComMerge(silencioso); }

async function carregarSheets() {
    var icon   = document.getElementById('syncIcon');
    var label  = document.getElementById('syncLabel');
    var status = document.getElementById('syncStatus');
    if (icon)  icon.textContent  = '🔄';
    if (label) label.textContent = 'A carregar...';
    try {
        var data = await jsonpFetch({ acao: 'carregar' });
        if (data && data.resultados !== undefined) {
            resultados = data.resultados || {};
            marcadores = data.marcadores || {};
            localStorage.setItem('copa26_res',  JSON.stringify(resultados));
            localStorage.setItem('copa26_marc', JSON.stringify(marcadores));
            var hora = new Date().toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
            if (status) status.textContent = 'Actualizado às ' + hora;
        } else {
            if (status) status.textContent = 'Sem dados no servidor';
        }
    } catch (err) {
        if (status) status.textContent = 'Offline — dados locais';
        console.warn('[Copa] carregarSheets:', err.message);
    } finally {
        if (icon)  icon.textContent  = '☁️';
        if (label) label.textContent = 'Sincronizar agora';
    }
}

async function sincronizarSheets(silencioso) {
    if (!silencioso) mostrarToast('☁️ A sincronizar...');
    await carregarSheets();
    navegar(abaAtual);
    if (!silencioso) mostrarToast('✅ Dados actualizados!');
}

// ============================================================
//  INIT
// ============================================================
carregarEstado();
navegar('hoje');
carregarSheets().then(function() { navegar(abaAtual); });
</script>
